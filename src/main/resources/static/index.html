<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCoding Portfolio API Tester</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-weight: 300; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; color: transparent; }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background-color: #2563eb; transform: translateY(-1px); }
        .input-group { margin-bottom: 1rem; }
        input, select {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.25rem;
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 4px;
        }
        pre {
            background: var(--bg-color);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid var(--border);
            color: var(--success);
        }
    </style>
</head>
<body>

    <h1>✨ VibeCoding MVP API Tester</h1>

    <div class="container">
        <h3>1. Create Portfolio (创建组合)</h3>
        <div class="input-group">
            <input type="text" id="pName" placeholder="Portfolio Name (e.g., Tech Growth)">
        </div>
        <div class="input-group">
            <input type="text" id="pUser" placeholder="User ID (e.g., user123)">
        </div>
        <button class="btn" onclick="createPortfolio()">Create Portfolio</button>
        <p id="createRes" style="color: var(--success)"></p>
    </div>

    <div class="container">
        <h3>2. View All Portfolios (查询组合)</h3>
        <button class="btn" onclick="loadPortfolios()">Fetch Portfolios</button>
        <pre id="portfoliosOut">Click to load...</pre>
    </div>

    <div class="container">
        <h3>3. Add Asset (录入明细)</h3>
        <div class="input-group">
            <input type="number" id="assetPid" placeholder="Portfolio ID (填入上方创建的ID)">
            <select id="assetType">
                <option value="STOCK">STOCK (股票)</option>
                <option value="CASH">CASH (现金)</option>
                <option value="BOND">BOND (债券)</option>
            </select>
            <input type="text" id="assetTicker" placeholder="Ticker Symbol (代码, e.g., AAPL)">
            <input type="number" id="assetVol" placeholder="Volume (数量, e.g., 10)">
            <input type="number" id="assetPrice" placeholder="Purchase Price (买入单价, e.g., 150)">
        </div>
        <button class="btn" onclick="addAsset()">Add Asset</button>
        <p id="assetRes" style="color: var(--success)"></p>
    </div>

    <div class="container">
        <h3>4. Calculate Performance (引擎评测)</h3>
        <div class="input-group">
            <input type="number" id="perfPid" placeholder="Portfolio ID (组合ID)">
        </div>
        <button class="btn" onclick="calcPerf()">Evaluate ROI Calculate</button>
        <pre id="perfOut">Result...</pre>
    </div>

    <script>
        const API_BASE = '/api/v1';

        async function createPortfolio() {
            const name = document.getElementById('pName').value || 'Default Name';
            const userId = document.getElementById('pUser').value || 'default_user';
            const res = await fetch(`${API_BASE}/portfolios`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, userId})
            });
            const data = await res.json();
            document.getElementById('createRes').innerText = `✅ Created successfully! ID: ${data.id}`;
        }

        async function loadPortfolios() {
            const res = await fetch(`${API_BASE}/portfolios`);
            const data = await res.json();
            document.getElementById('portfoliosOut').innerText = JSON.stringify(data, null, 2);
        }

        async function addAsset() {
            const pid = document.getElementById('assetPid').value;
            if(!pid) return alert("Please enter Portfolio ID");
            
            const payload = {
                assetType: document.getElementById('assetType').value,
                tickerSymbol: document.getElementById('assetTicker').value,
                volume: parseFloat(document.getElementById('assetVol').value) || 0,
                purchasePrice: parseFloat(document.getElementById('assetPrice').value) || 0,
                purchaseDate: new Date().toISOString().split('T')[0]
            };
            const res = await fetch(`${API_BASE}/portfolios/${pid}/items`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            document.getElementById('assetRes').innerText = `✅ Added Item successfully! Item ID: ${data.id}`;
        }

        async function calcPerf() {
            const pid = document.getElementById('perfPid').value;
            if(!pid) return alert("Please enter Portfolio ID");
            const res = await fetch(`${API_BASE}/portfolios/${pid}/performance`);
            const data = await res.json();
            document.getElementById('perfOut').innerText = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
